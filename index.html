<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Польовий тренер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; }
        .glass-input:focus { border-color: #3b82f6; outline: none; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .error-input { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4) !important; background: rgba(239, 68, 68, 0.05) !important; }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #34d399; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#0b1120] text-white min-h-screen p-6 font-sans flex justify-center">

    <div class="w-full max-w-sm relative pb-10">
        <div id="page-1" class="page-section flex flex-col items-center pt-8 animate-fade">
            <div class="w-full text-center mb-10">
                <h1 class="text-3xl font-bold text-white mb-2">Польовий тренер</h1>
                <p class="gradient-text font-bold uppercase tracking-widest text-[10px]">Створення заявки на візит</p>
            </div>
            <div class="mb-10">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-28 h-28 mx-auto animate-bounce" alt="Trainer">
            </div>
            <div class="w-full space-y-4">
                <button onclick="startNewRequest()" class="w-full p-5 rounded-2xl glass hover:bg-blue-600/20 transition-all active:scale-95 flex items-center gap-4">
                    <span class="text-2xl">🚀</span>
                    <span class="font-bold text-lg text-blue-100">Нова заявка</span>
                </button>
                <button onclick="showPage('page-my-orders-menu')" class="w-full p-5 rounded-2xl glass hover:bg-green-600/20 transition-all active:scale-95 flex items-center gap-4">
                    <span class="text-2xl">📋</span>
                    <span class="font-bold text-lg text-slate-200">Мої заявки</span>
                </button>
                <button onclick="openProfileFromMenu()" class="w-full p-5 rounded-2xl glass hover:bg-purple-600/20 transition-all active:scale-95 flex items-center gap-4">
                    <span class="text-2xl">👤</span>
                    <span class="font-bold text-lg text-slate-200">Власний кабінет</span>
                </button>
            </div>
        </div>

        <div id="page-my-orders-menu" class="page-section hidden pt-6">
            <div class="flex items-center mb-6">
                <button onclick="showPage('page-1')" class="text-slate-400 hover:text-white mr-4 text-2xl">←</button>
                <h2 class="text-2xl font-bold text-emerald-400">Мої заявки</h2>
            </div>
            <div class="w-full space-y-4">
                <button onclick="loadOrders('Активна')" class="w-full p-5 rounded-2xl glass hover:bg-green-600/20 transition-all active:scale-95 flex items-center gap-4 border-l-4 border-l-green-500">
                    <span class="text-2xl">🟢</span>
                    <span class="font-bold text-lg text-white">Активні</span>
                </button>
                <button onclick="loadOrders('Скасована')" class="w-full p-5 rounded-2xl glass hover:bg-red-600/20 transition-all active:scale-95 flex items-center gap-4 border-l-4 border-l-red-500">
                    <span class="text-2xl">🔴</span>
                    <span class="font-bold text-lg text-white">Скасовані</span>
                </button>
                <button onclick="loadOrders('Архів')" class="w-full p-5 rounded-2xl glass hover:bg-slate-600/20 transition-all active:scale-95 flex items-center gap-4 border-l-4 border-l-slate-400">
                    <span class="text-2xl">📁</span>
                    <span class="font-bold text-lg text-white">Архівні</span>
                </button>
            </div>
        </div>

        <div id="page-orders-list" class="page-section hidden pt-6">
            <div class="flex items-center mb-6">
                <button onclick="showPage('page-my-orders-menu')" class="text-slate-400 hover:text-white mr-4 text-2xl">←</button>
                <h2 id="orders-list-title" class="text-2xl font-bold text-white">...</h2>
            </div>
            <div id="orders-loading" class="text-center text-slate-400 py-10">
                <div class="loader"></div>
                <p>Шукаємо ваші заявки в базі...</p>
            </div>
            <div id="orders-container" class="space-y-4 hidden"></div>
        </div>

        <div id="page-cancel-reason" class="page-section hidden pt-6">
            <div class="flex items-center mb-6">
                <button onclick="showPage('page-orders-list')" class="text-slate-400 hover:text-white mr-4 text-2xl">←</button>
                <h2 class="text-2xl font-bold text-red-400">Вкажіть причину скасування</h2>
            </div>
            <div class="glass p-5 rounded-2xl flex flex-col h-[60vh]">
                <label class="text-sm font-bold text-slate-200 mb-1 block">Детально поясніть скасування візиту</label>
                <textarea id="cancel-reason-text" placeholder="Вкажіть причину тут..." class="w-full flex-1 p-4 rounded-xl glass-input resize-none text-base leading-relaxed"></textarea>
                <div class="flex gap-3 mt-4">
                    <button onclick="showPage('page-orders-list')" class="flex-1 bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold text-white transition-colors">Назад</button>
                    <button onclick="submitCancellation()" class="flex-1 bg-red-600 hover:bg-red-500 p-4 rounded-xl font-bold text-white transition-colors">Скасувати</button>
                </div>
            </div>
        </div>

        <div id="page-2" class="page-section hidden pt-6"><div class="flex items-center mb-6"><button onclick="showPage('page-1')" class="text-slate-400 hover:text-white mr-4 text-2xl">←</button><h2 class="text-2xl font-bold text-amber-400">Власний кабінет</h2></div><div class="glass p-6 rounded-2xl"><p class="text-xs text-slate-400 mb-5">Введіть ваші дані один раз, щоб не заповнювати їх при кожній новій заявці.</p><label class="text-xs font-bold text-slate-300 uppercase tracking-wider mb-1 block">Ваше ПІБ</label><input type="text" id="user-fio" placeholder="Іванов Іван Іванович" class="w-full p-4 rounded-xl mb-5 glass-input"><label class="text-xs font-bold text-slate-300 uppercase tracking-wider mb-1 block">Телефон</label><input type="tel" id="user-phone" placeholder="38 0__ ___ __ __" class="w-full p-4 rounded-xl mb-6 glass-input"><button onclick="saveProfile()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-white transition-colors">Зберегти та продовжити</button></div></div>
        <div id="page-3" class="page-section hidden pt-6"><div class="flex items-center mb-6"><button onclick="showPage('page-1')" class="text-slate-400 hover:text-white mr-4 text-2xl">←</button><h2 class="text-2xl font-bold text-blue-400">Локація та дата</h2></div><div class="glass p-6 rounded-2xl space-y-6"><div><label
